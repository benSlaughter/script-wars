services:
  script-wars:
    build: .
    container_name: script-wars
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - script-wars-data:/app/data
    environment:
      - NODE_ENV=production
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - DATABASE_URL=/app/data/script-wars.db
      - PORT=3000
      - HOST=0.0.0.0

volumes:
  script-wars-data:
    name: script-wars-data
