services:
  script-wars:
    image: ghcr.io/benslaughter/script-wars:latest
    container_name: script-wars
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3000"
    volumes:
      - script-wars-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=https://script-wars.benslaughter.com
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=host
      - BETTER_AUTH_URL=https://script-wars.benslaughter.com

volumes:
  script-wars-data:
